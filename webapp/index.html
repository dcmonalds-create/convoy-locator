<!DOCTYPE html>
<html lang="hu">
<head>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ── Design System ──────────────────────────────────────────────────────────── */
:root {
  --bg:         #0A0A0B;
  --surface:    #141416;
  --surface2:   #1C1C1F;
  --border:     #2A2A2F;
  --accent:     #F59E0B;
  --accent-dim: #78450A;
  --accent-glow:rgba(245,158,11,0.15);
  --success:    #22C55E;
  --danger:     #EF4444;
  --warn:       #F97316;
  --text:       #F4F4F5;
  --text-muted: #71717A;
  --text-dim:   #3F3F46;
  --radius:     14px;
  --radius-sm:  8px;
  --nav-h:      64px;
  --header-h:   56px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────────────────────── */
.header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}

.header-back {
  width: 36px; height: 36px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  font-size: 18px;
  transition: background 0.15s;
}
.header-back:active { background: var(--border); }
.header-back.hidden { visibility: hidden; }

.header-title {
  flex: 1;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-title span.badge {
  font-size: 11px;
  font-weight: 600;
  background: var(--accent-glow);
  color: var(--accent);
  border: 1px solid var(--accent-dim);
  border-radius: 20px;
  padding: 2px 8px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header-action {
  width: 36px; height: 36px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  transition: background 0.15s;
}
.header-action:active { background: var(--border); }
.header-action.hidden { visibility: hidden; }

/* ── Screens ─────────────────────────────────────────────────────────────────── */
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 8px);
}
.screen.hidden { display: none; }

/* ── Bottom Navigation ──────────────────────────────────────────────────────── */
.bottom-nav {
  height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  flex-shrink: 0;
  z-index: 10;
}
.nav-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  cursor: pointer;
  transition: color 0.15s;
  color: var(--text-muted);
  border: none;
  background: none;
  padding: 0 0 2px;
  font-family: inherit;
}
.nav-btn .nav-icon { width: 22px; height: 22px; flex-shrink: 0; }
.nav-btn .nav-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn .nav-label { font-size: 9px; font-weight: 500; letter-spacing: 0.2px; }
.nav-btn.active { color: var(--accent); }
.nav-btn:active { opacity: 0.7; }

/* ── Shortcuts ───────────────────────────────────────────────────────────────── */
.shortcut-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.shortcut-card-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
.shortcut-card-sub  { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.shortcut-actions   { display: flex; gap: 6px; flex-shrink: 0; }
.shortcut-del-btn   { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--danger); font-size: 14px; padding: 6px 10px; cursor: pointer; }

/* ── Location Bar ─────────────────────────────────────────────────────────────── */
.location-bar {
  margin: 12px 16px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.location-bar:active { border-color: var(--accent); }
.location-bar.has-location { border-color: var(--success); }
.location-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
  transition: background 0.3s;
}
.location-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
.location-dot.loading {
  background: var(--accent);
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.location-text { flex: 1; font-size: 13px; color: var(--text-muted); }
.location-text.active { color: var(--text); }
.location-coords { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.location-refresh { font-size: 18px; color: var(--text-dim); flex-shrink: 0; }

/* ── Best Stop Button ────────────────────────────────────────────────────────── */
.coord-input-wrap {
  margin: 0 12px 8px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.coord-input-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.coord-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  padding: 8px 10px;
  outline: none;
}
.coord-input:focus { border-color: var(--accent); }
.coord-input::placeholder { color: var(--text-dim); }

.best-stop-btn {
  margin: 12px 16px 0;
  background: linear-gradient(135deg, #B45309 0%, #F59E0B 100%);
  border: none;
  border-radius: var(--radius);
  padding: 16px 20px;
  cursor: pointer;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: opacity 0.15s, transform 0.1s;
  font-family: inherit;
}
.best-stop-btn:active { opacity: 0.85; transform: scale(0.98); }
.best-stop-btn-icon { font-size: 28px; line-height: 1; }
.best-stop-btn-text { text-align: left; }
.best-stop-btn-title { font-size: 16px; font-weight: 800; color: #FFF; letter-spacing: -0.3px; }
.best-stop-btn-sub { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 2px; }

/* ── Section Label ───────────────────────────────────────────────────────────── */
.section-label {
  padding: 16px 16px 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ── Category Grid ───────────────────────────────────────────────────────────── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 0 16px;
}
.cat-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 6px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s;
  font-family: inherit;
}
.cat-btn:active { transform: scale(0.94); border-color: var(--accent); }
.cat-icon-tile {
  width: 52px; height: 52px;
  border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cat-icon-tile svg {
  width: 26px; height: 26px;
  stroke: #fff; fill: none;
  stroke-width: 1.8;
  stroke-linecap: round; stroke-linejoin: round;
}
.cat-btn-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-align: center; line-height: 1.3; }

/* ── Cards ───────────────────────────────────────────────────────────────────── */
.results-list {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: border-color 0.15s;
}
.card:active { border-color: var(--accent); }

.card-rank {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.card-rank.gold   { color: #F59E0B; }
.card-rank.silver { color: #94A3B8; }
.card-rank.bronze { color: #CD7C4A; }

.card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-wrap: wrap;
}
.card-rating {
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
}
.card-address {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  line-height: 1.4;
}
.card-dist {
  display: inline-block;
  margin-top: 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--success);
  font-variant-numeric: tabular-nums;
}
.card-meta {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-meta-row {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-meta-row.missing { color: var(--text-dim); }
.card-actions {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}
.btn {
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--accent); color: #000; flex: 1; justify-content: center; }
.btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

/* ── Checklist Screen ────────────────────────────────────────────────────────── */
.checklist-section {
  margin: 12px 16px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.checklist-section-header {
  padding: 12px 14px;
  background: var(--surface2);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.checklist-item {
  padding: 13px 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.checklist-item:last-child { border-bottom: none; }
.checklist-item:active { background: var(--surface2); }
.checklist-item.checked .check-text { color: var(--text-muted); text-decoration: line-through; }
.check-box {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}
.checklist-item.checked .check-box {
  background: var(--success);
  border-color: var(--success);
}
.check-tick { font-size: 13px; color: white; display: none; }
.checklist-item.checked .check-tick { display: block; }
.check-text { font-size: 14px; line-height: 1.4; flex: 1; }

.notes-section {
  margin: 12px 16px 0;
}
.notes-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.notes-textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 12px 14px;
  resize: none;
  min-height: 90px;
  outline: none;
  transition: border-color 0.15s;
}
.notes-textarea:focus { border-color: var(--accent); }
.notes-textarea::placeholder { color: var(--text-dim); }
.notes-save-btn {
  margin-top: 8px;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  border-radius: var(--radius);
  padding: 13px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.notes-save-btn:active { background: var(--accent-glow); }

.progress-bar-wrap {
  margin: 12px 16px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-text { font-size: 13px; color: var(--text-muted); flex: 1; }
.progress-count { font-size: 15px; font-weight: 700; color: var(--success); }
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--success);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* ── Journal Screen ──────────────────────────────────────────────────────────── */
.journal-search-bar {
  padding: 10px 16px 6px;
  flex-shrink: 0;
}
.journal-search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-size: 14px;
  padding: 9px 16px;
  outline: none;
}
.journal-search-input:focus { border-color: var(--accent); }
.journal-search-input::placeholder { color: var(--text-muted); }

/* ── Export modal ────────────────────────────────────────────────────────────── */
.export-period-row { display:flex; gap:6px; margin-bottom:14px; }
.export-period-btn { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text-muted); font-size:13px; font-weight:600; padding:9px 4px; cursor:pointer; }
.export-period-btn.active { background:var(--accent); border-color:var(--accent); color:#000; }
.export-month-row { margin-bottom:14px; }
.export-actions { display:flex; gap:10px; }
.export-actions .btn { flex:1; font-size:14px; }

/* ── Megtett km összegző sáv ─────────────────────────────────────────────────── */
.km-summary {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  margin: 10px 16px 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 7px 12px;
}
.km-summary-main { display: flex; flex-direction: column; gap: 0; min-width: 0; }
.km-summary-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
.km-summary-value { font-size: 18px; font-weight: 800; color: var(--accent); line-height: 1.15; }
.km-summary-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.km-month-select {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 12px; padding: 5px 6px; max-width: 110px; outline: none;
}
.km-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.km-toggle-btn { background: none; border: none; color: var(--text-muted); font-size: 12px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
.km-toggle-btn.active { background: var(--accent); color: #000; font-weight: 700; }

.journal-list {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.journal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.journal-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.journal-card-id {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.journal-card-date {
  font-size: 11px;
  color: var(--text-dim);
}
.journal-card-route {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.journal-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.journal-tag {
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 4px;
}
.journal-tag-note {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 4px;
  line-height: 1.4;
}
.journal-card-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
.journal-action-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  display: flex; align-items: center; gap: 5px;
  transition: color 0.15s, border-color 0.15s;
}
.journal-action-btn:active { border-color: var(--accent); color: var(--accent); }
.journal-action-btn.danger:active { border-color: var(--danger); color: var(--danger); }

/* ── Modal ───────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: flex-end;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.2s;
}
.modal-overlay.visible { opacity: 1; }
.modal-overlay.hidden { display: none; }
.modal-sheet {
  background: var(--surface);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  width: 100%;
  padding: 0 0 calc(env(safe-area-inset-bottom, 0px) + 16px);
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.25s ease;
}
.modal-overlay.visible .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  padding: 0 16px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 11px 13px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-dim); }
.modal-actions {
  padding: 0 16px;
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

/* ── Empty State ─────────────────────────────────────────────────────────────── */
.empty-state {
  padding: 48px 24px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.empty-state-text { font-size: 14px; line-height: 1.5; }

/* ── Loading spinner ────────────────────────────────────────────────────────── */
.spinner-wrap {
  padding: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  color: var(--text-muted);
  font-size: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ───────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--danger);  color: var(--danger);  }
</style>

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
}

// ── Navigation ────────────────────────────────────────────────────────────────
const BACK_MAP = { results: 'home', beststop: 'home' };

function navTo(screen) {
  const old = document.getElementById('s-' + S.screen);
  const next = document.getElementById('s-' + screen);
  if (!next) return;
  if (old) old.classList.add('hidden');
  next.classList.remove('hidden');
  S.screen = screen;

  // nav bar
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === screen);
  });

  // header
  const back = document.getElementById('hdr-back');
  const title = document.getElementById('hdr-title');
  const action = document.getElementById('hdr-action');
  const hasBk = !!BACK_MAP[screen];
  back.classList.toggle('hidden', !hasBk);
  action.classList.add('hidden');
  action.onclick = null;
  action.textContent = '';

  const titles = { home: t('home'), results: t('results'), beststop: t('beststop'), checklist: t('checklist'), journal: t('journal'), shortcuts: '⭐ Shortcuts' };
  title.textContent = titles[screen] || screen;

  if (screen === 'journal' && S.chatId) {
    action.classList.remove('hidden');
    action.textContent = '➕';
    action.onclick = openJrnModal;
  }
  if (screen === 'shortcuts') {
    action.classList.remove('hidden');
    action.textContent = '➕';
    action.onclick = () => showModal('sc-modal');
  }
  if (screen === 'checklist') renderChecklist();
  if (screen === 'journal') loadJournal();
  if (screen === 'shortcuts') renderShortcuts();
  if (screen === 'beststop' && !S.clusters.length) doBestStop();
}

function navBack() {
  const dest = BACK_MAP[S.screen] || 'home';
  navTo(dest);
}

// ── Location ──────────────────────────────────────────────────────────────────
function getLocation() {
  const dot  = document.getElementById('loc-dot');
  const text = document.getElementById('loc-text');
  const coords = document.getElementById('loc-coords');
  dot.className = 'location-dot loading';
  text.className = 'location-text';
  text.textContent = t('locGetting');
  coords.textContent = '';

  if (!navigator.geolocation) {
    dot.className = 'location-dot';
    text.textContent = t('locFail');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      S.loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      dot.className = 'location-dot active';
      text.className = 'location-text active';
      // reverse geocode approximation: show coords
      text.textContent = `📍 ${S.loc.lat.toFixed(4)}, ${S.loc.lng.toFixed(4)}`;
      coords.textContent = `±${Math.round(pos.coords.accuracy)} m`;
      document.getElementById('loc-bar').classList.add('has-location');
    },
    err => {
      dot.className = 'location-dot';
      text.textContent = t('locFail');
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
  );
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, method, body) {
  const opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    let detail = `HTTP ${r.status}`;
    try { const j = await r.json(); detail = j.detail || detail; } catch(_) {}
    throw new Error(detail);
  }
  return r.json();
}

// ── Search location resolver ──────────────────────────────────────────────────
// Returns {lat, lng} from custom coord input if filled, else from GPS.
// Returns null if neither is available.
function getSearchLoc() {
  const raw = (document.getElementById('custom-coord')?.value || '').trim();
  if (raw) {
    const parts = raw.split(/[,;\s]+/).map(Number);
    if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      return { lat: parts[0], lng: parts[1] };
    }
    showToast('❌ Érvénytelen koordináta — pl: 47.1182, 21.8173', 'error');
    return null;
  }
  return S.loc;
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch(category) {
  const loc = getSearchLoc();
  if (!loc) { showToast(t('noLoc'), 'error'); getLocation(); return; }
  navTo('results');
  const label = document.getElementById('res-label');
  const list  = document.getElementById('results-list');
  label.textContent = `${CATS[category]?.emoji || ''} ${catLabel(category)}`;
  list.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><div>${t('searching')}</div></div>`;
  S.category = category;

  try {
    const data = await api('/api/search', 'POST', { lat: loc.lat, lng: loc.lng, category, lang: S.lang });
    S.results = data.results || [];
    renderResults();
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Hiba</div><div class="empty-state-text">${e.message}</div></div>`;
  }
}

function fmtDist(km) {

}

// ── Megtett km összegzés ──────────────────────────────────────────────────────
function parseKm(v) {
  if (!v) return 0;
  // Megtett km mindig egész szám — minden nem-számjegyet eldobunk
  // (kezeli: "401", "250 km", "1.200", "1,200", "1 200" → helyes egész)
  const digits = String(v).replace(/[^\d]/g, '');
  return digits ? parseInt(digits, 10) : 0;
}
function entryMonth(e) {
  const d = (e.date || '').slice(0, 7);
  return /^\d{4}-\d{2}$/.test(d) ? d : null;
}
function setKmMode(mode) {
  S.kmMode = mode;
  document.getElementById('km-tab-month').classList.toggle('active', mode === 'month');
  document.getElementById('km-tab-all').classList.toggle('active', mode === 'all');
  document.getElementById('km-month').style.display = (mode === 'month') ? '' : 'none';
  updateKmSummary();
}
function updateKmSummary() {
  const entries = S.journal || [];
  const sel = document.getElementById('km-month');
  if (!sel) return;
  // A select aktuális értéke az elsődleges (onchange / kézi választás), majd S.kmMonth
  const prevSelected = sel.value || S.kmMonth;
  const months = [...new Set(entries.map(entryMonth).filter(Boolean))].sort().reverse();
  const wanted = months.map(m => `<option value="${m}">${m}</option>`).join('');
  if (sel.innerHTML !== wanted) sel.innerHTML = wanted;
  let cur = prevSelected;
  if (!months.includes(cur)) cur = months[0] || '';
  S.kmMonth = cur;
  sel.value = cur;

  let total;
  if (S.kmMode === 'month') {
    total = entries.filter(e => entryMonth(e) === S.kmMonth)
                   .reduce((s, e) => s + parseKm(e.megtett_km), 0);
  } else {
    total = entries.reduce((s, e) => s + parseKm(e.megtett_km), 0);
  }
  document.getElementById('km-total').textContent = total.toLocaleString('hu-HU') + ' km';
}

function filterJournal() {
  const q = (document.getElementById('jrn-search')?.value || '').toLowerCase().trim();
  if (!q) { renderJournal(S.journal); return; }
  const filtered = S.journal.filter(e =>
    [e.szallito, e.rendszam, e.sofor_neve, e.kisert_rsz, e.route, e.datum_ind, e.datum_erk, e.gmaps_route, e.notes]
      .some(v => v && v.toLowerCase().includes(q))
  );
  renderJournal(filtered);
}

// ── CSV Export ────────────────────────────────────────────────────────────────
// ── Export helpers ────────────────────────────────────────────────────────────
const _EXP_COLS = ['ID','Szállító','Rendszám','Sofőr neve','Kísért RSZ',
  'Indulás dátuma','Érkezés dátuma','Index km (ind.)','Index km (erk.)',
  'Megtett km','Útvonal','Google Maps útvonal','Megjegyzés'];

function _expRow(e) {
  const esc = v => `"${(String(v||'')).replace(/"/g,'""')}"`;
  return [e.id, e.szallito, e.rendszam, e.sofor_neve, e.kisert_rsz,
    e.datum_ind, e.datum_erk, e.index_ind, e.index_erk,
    e.megtett_km, e.route, e.gmaps_route, e.notes].map(esc).join(',');
}

function _expSummaryRow(entries) {
  const totalKm = entries.reduce((s,e) => s + parseKm(e.megtett_km), 0);
  const esc = v => `"${v}"`;
  return [esc('ÖSSZESÍTÉS'), esc(`${entries.length} fuvar`), '', '', '', '', '', '', '',
    esc(totalKm ? totalKm.toLocaleString('hu-HU') + ' km' : '-'), '', '', ''].join(',');
}

function _buildCSV(entries) {
  const esc = v => `"${v}"`;
  const rows = entries.map(_expRow);
  return '﻿' + [_EXP_COLS.map(esc).join(','), ...rows, _expSummaryRow(entries)].join('\r\n');
}

function _expFilename(period, monthVal) {
  const d = new Date().toISOString().slice(0,10);
  if (period === 'week')  return `naplo_heti_${d}.csv`;
  if (period === 'month') return `naplo_${monthVal||d.slice(0,7)}.csv`;
  return `naplo_osszes_${d}.csv`;
}

// ── Export modal ──────────────────────────────────────────────────────────────
const _expState = { period: 'week', month: '' };

function _isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const y = d.getUTCFullYear();
  const w = Math.ceil((((d - new Date(Date.UTC(y,0,1))) / 86400000) + 1) / 7);
  return `${y}-W${String(w).padStart(2,'0')}`;
}

function _filterEntries(period, month) {
  const all = S.journal || [];
  if (period === 'all') return all;
  const now = new Date();
  if (period === 'week') {
    const curWeek = _isoWeek(now);
    return all.filter(e => {
      const d = e.datum_ind && e.datum_ind !== '-' ? e.datum_ind : (e.date||'');
      try { return d && _isoWeek(new Date(d.slice(0,10))) === curWeek; } catch(_) { return false; }
    });
  }
  if (period === 'month') {
    const m = month || now.toISOString().slice(0,7);
    return all.filter(e => {
      const d = e.datum_ind && e.datum_ind !== '-' ? e.datum_ind : (e.date||'');
      return d && d.startsWith(m);
    });
  }
  return all;
}

function openExportModal() {
  if (!S.journal.length) { showToast('Nincs exportálható bejegyzés', 'error'); return; }
  // feltölt hónap-választót
  const months = [...new Set((S.journal||[]).map(e => {
    const d = e.datum_ind && e.datum_ind !== '-' ? e.datum_ind : (e.date||'');
    return d ? d.slice(0,7) : null;
  }).filter(Boolean))].sort().reverse();
  const sel = document.getElementById('exp-month-sel');
  sel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
  _expState.month = months[0] || new Date().toISOString().slice(0,7);
  sel.value = _expState.month;
  setExportPeriod('week');
  showModal('export-modal');
}

function closeExportModal(e) {
  if (!e || e.target === document.getElementById('export-modal'))
    hideModal('export-modal');
}

function setExportPeriod(p) {
  _expState.period = p;
  ['week','month','all'].forEach(k =>
    document.getElementById(`exp-btn-${k}`).classList.toggle('active', k === p));
  document.getElementById('exp-month-row').style.display = p === 'month' ? '' : 'none';
  if (p === 'month') {
    _expState.month = document.getElementById('exp-month-sel').value;
  }
  _updateExpPreview();
}

function _updateExpPreview() {
  const sel = document.getElementById('exp-month-sel');
  if (_expState.period === 'month') _expState.month = sel.value;
  const entries = _filterEntries(_expState.period, _expState.month);
  const km = entries.reduce((s,e) => s + parseKm(e.megtett_km), 0);
  const label = { week:'Ez a hét', month:_expState.month, all:'Összes' }[_expState.period];
  document.getElementById('exp-preview').textContent =
    `${label} · ${entries.length} fuvar · ${km ? km.toLocaleString('hu-HU') + ' km' : '0 km'}`;
}

async function doExport(action) {
  const sel = document.getElementById('exp-month-sel');
  if (_expState.period === 'month') _expState.month = sel.value;
  const entries = _filterEntries(_expState.period, _expState.month);
  if (!entries.length) { showToast('Nincs bejegyzés ebben az időszakban', 'error'); return; }

  const csv      = _buildCSV(entries);
  const filename = _expFilename(_expState.period, _expState.month);
  hideModal('export-modal');

  if (action === 'download') {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    showToast(`✅ CSV letöltve (${entries.length} sor)`, 'success');
  } else {
    try {
      const r = await api(`/api/journal/${S.chatId}/export`, 'POST', {
        period: _expState.period,
        month:  _expState.month,
        filename,
      });
      showToast(`📤 Elküldve Telegramra (${r.count} fuvar · ${r.total_km} km)`, 'success');
    } catch(e) {
      showToast('❌ Küldés sikertelen: ' + e.message, 'error');
    }
  }
}

async function restoreFromFile(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const entries = JSON.parse(text);
    if (!Array.isArray(entries)) throw new Error('Érvénytelen formátum');
    if (!confirm(`${entries.length} bejegyzést állítsak vissza?`)) return;
    const r = await api(`/api/journal/${S.chatId}/restore`, 'POST', { entries });
    showToast(`✅ Visszaállítva: ${r.restored} új bejegyzés (összes: ${r.total})`, 'success');
    await loadJournal();
  } catch(e) {
    showToast('❌ Hiba: ' + e.message, 'error');
  }
}

async function backupJournal() {
  if (!S.journal || !S.journal.length) { showToast('⚠️ Nincs mit menteni', 'error'); return; }
  try {
    const r = await api(`/api/journal/${S.chatId}/backup`, 'POST');
    showToast(`💾 Backup elküldve a chatbe (${r.count} bejegyzés)`, 'success');
  } catch (e) {
    showToast('❌ Backup sikertelen: ' + e.message, 'error');
  }
}

// ── Shortcuts ─────────────────────────────────────────────────────────────────
function _saveShortcuts() {
  localStorage.setItem('cl_shortcuts', JSON.stringify(S.shortcuts));
}

function saveShortcut() {
  const name = document.getElementById('sc-name').value.trim();
  const raw  = document.getElementById('sc-url').value.trim();
  if (!name || !raw) { showToast('Név és link szükséges', 'error'); return; }

  // Accept raw coordinates or full URL
  let url = raw;
  if (!raw.startsWith('http')) {
    const parts = raw.split(/[,;\s]+/).map(Number);
    if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      url = `https://maps.google.com/?q=${parts[0]},${parts[1]}`;
    }
  }

  const id = Date.now();
  S.shortcuts.push({ id, name, url });
  _saveShortcuts();
  closeScModal();
  renderShortcuts();
  showToast('⭐ Shortcut mentve', 'success');
}

function deleteShortcut(id) {
  S.shortcuts = S.shortcuts.filter(s => s.id !== id);
  _saveShortcuts();
  renderShortcuts();
}

function renderShortcuts() {
  const list = document.getElementById('shortcuts-list');
  if (!list) return;
  const q = (document.getElementById('sc-search')?.value || '').toLowerCase().trim();
  const items = q ? S.shortcuts.filter(s => s.name.toLowerCase().includes(q) || s.url.toLowerCase().includes(q)) : S.shortcuts;

  if (!items.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">⭐</div>
      <div class="empty-state-title">${q ? 'Nincs találat' : 'Még nincsenek shortcutok'}</div>
      <div class="empty-state-text">${q ? '' : 'Adj hozzá a ➕ gombbal.'}</div>
    </div>`;
    return;
  }
  list.innerHTML = items.map(s => `
    <div class="shortcut-card">
      <div style="flex:1;min-width:0">
        <div class="shortcut-card-name">${s.name}</div>
        <div class="shortcut-card-sub">${s.url}</div>
      </div>
      <div class="shortcut-actions">
        <button class="btn btn-primary" style="padding:8px 12px;font-size:13px" onclick="openMaps('${s.url}')">🗺</button>
        <button class="shortcut-del-btn" onclick="deleteShortcut(${s.id})">🗑</button>
      </div>
    </div>`).join('');
}

function closeScModal(ev) {
  if (ev && ev.target !== document.getElementById('sc-modal')) return;
  document.getElementById('sc-name').value = '';
  document.getElementById('sc-url').value  = '';
  hideModal('sc-modal');
}

async function saveJrnEntry() {

      sofor_neve:  document.getElementById('jf-sofor').value.trim()      || '-',

      datum_ind:   document.getElementById('jf-datum-ind').value.trim()  || '-',
      datum_erk:   document.getElementById('jf-datum-erk').value.trim()  || '-',
      index_ind:   document.getElementById('jf-ind').value.trim()        || '-',
      index_erk:   document.getElementById('jf-erk').value.trim()        || '-',
      route:       document.getElementById('jf-route').value.trim()      || '-',
      gmaps_route: document.getElementById('jf-gmaps').value.trim()      || '',
      megtett_km:  document.getElementById('jf-megtett').value.trim()    || '-',
      notes:       document.getElementById('jf-notes').value.trim()      || '',
    });

    showToast(t('entrySaved'), 'success');
    loadJournal();

    showToast('❌ ' + e.message, 'error');
  }

function closeJrnModal(ev) {
  if (ev && ev.target !== document.getElementById('jrn-modal')) return;
  hideModal('jrn-modal');
}

// ── Journal Edit ──────────────────────────────────────────────────────────────
const EDIT_FIELDS = {
  szallito:    { label: '🏢 Szállító',                    placeholder: 'Cég neve' },
  rendszam:    { label: '🚗 Rendszám',                    placeholder: 'ABC-123' },
  sofor_neve:  { label: '👤 Sofőr neve',                  placeholder: 'Kovács János' },
  kisert_rsz:  { label: '🚛 Kísért jármű rendszáma',      placeholder: 'XY-1234' },
  datum_ind:   { label: '📅 Dátum / Óra — Induláskor',   placeholder: '2025.06.12 — 08:30' },
  datum_erk:   { label: '📅 Dátum / Óra — Érkezéskor',   placeholder: '2025.06.12 — 14:15' },
  index_ind:   { label: '🔢 Index Km — Induláskor',       placeholder: '124500' },
  index_erk:   { label: '🔢 Index Km — Érkezéskor',       placeholder: '124748' },
  megtett_km:  { label: '🔢 Megtett km',                  placeholder: '248' },
  route:       { label: '🛣 Útvonal',                     placeholder: 'Budapest → Debrecen' },
  gmaps_route: { label: '🗺 Google Maps kamion útvonal',  placeholder: 'https://maps.google.com/…' },
  notes:       { label: '📝 Megjegyzés',                  placeholder: '' },
};

function openEditJrn(id) {
  const entry = S.journal.find(e => e.id === id);
  if (!entry) return;
  S.editId = id;
  // Show field selector as buttons in modal
  const title = document.getElementById('jrn-modal-title');
  const body  = document.getElementById('jrn-modal').querySelector('.modal-body');
  const acts  = document.getElementById('jrn-modal').querySelector('.modal-actions');

  title.textContent = `✏️ #${id} szerkesztése`;
  body.innerHTML = Object.entries(EDIT_FIELDS).map(([k, f]) => `
    <button class="btn btn-ghost" style="justify-content:space-between" onclick="startEditField('${id}','${k}','${(entry[k]||'').replace(/'/g,"\\'")}')">
      <span>${f.label}</span>
      <span style="color:var(--text-dim);font-size:12px;max-width:60%;text-overflow:ellipsis;overflow:hidden;white-space:nowrap">${entry[k] || '-'}</span>
    </button>`).join('');
  acts.innerHTML = '<button class="btn btn-ghost" onclick="closeJrnModal()">Vissza</button>';
  showModal('jrn-modal');
}

function startEditField(id, field, currentVal) {
  S.editId    = parseInt(id);
  S.editField = field;
  const cfg = EDIT_FIELDS[field];
  document.getElementById('edit-modal-title').textContent = `✏️ ${cfg.label}`;
  document.getElementById('edit-modal-label').textContent  = cfg.label;
  const inp = document.getElementById('edit-modal-input');
  inp.placeholder = cfg.placeholder;
  inp.value = currentVal;
  hideModal('jrn-modal');
  showModal('edit-modal');
  setTimeout(() => inp.focus(), 300);
}

async function saveEditField() {
  const val = document.getElementById('edit-modal-input').value.trim();
  try {
    await api(`/api/journal/${S.chatId}/${S.editId}`, 'PUT', { field: S.editField, value: val });
    closeEditModal();
    showToast(t('entryUpdated'), 'success');
    loadJournal();
  } catch (e) {
    showToast('❌ ' + e.message, 'error');
  }
}

function closeEditModal(ev) {
  if (ev && ev.target !== document.getElementById('edit-modal')) return;
  hideModal('edit-modal');
}

async function deleteJrn(id) {
  if (!confirm(`#${id} törlése?`)) return;
  try {
    await api(`/api/journal/${S.chatId}/${id}`, 'DELETE');
    showToast(t('entryDeleted'), 'success');
    loadJournal();
  } catch (e) {
    showToast('❌ ' + e.message, 'error');
  }
}

function setLang(l) {
  S.lang = l;
  localStorage.setItem('cl_lang', l);
  hideModal('lang-modal');
  buildCatGrid();
  updateI18n();

// ── Modal helpers ─────────────────────────────────────────────────────────────
function showModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  requestAnimationFrame(() => el.classList.add('visible'));
}
function hideModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('visible');
  setTimeout(() => el.classList.add('hidden'), 250);
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildCatGrid();
// Only auto-request location inside Telegram (browser preview blocks geolocation anyway)
if (tg && tg.initData) getLocation();
